name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore RestaurantPOS.sln

      - name: Build
        run: dotnet build RestaurantPOS.sln --no-restore

      - name: Test
        run: dotnet test RestaurantPOS.Tests --no-build

      - name: Format check
        run: dotnet format --verify-no-changes
